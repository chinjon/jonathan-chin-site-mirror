<div id="post-list">
    <div>
        {% if postListHeadline %}
        <h2 data-highlight="primary">
            {{ postListHeadline }}
        </h2>
        {% endif %}
        <div>
            {% for item in postListItems %}
            <ul>
                <li><a href="{{ item.url }}">{{ item.data.title}}</a></li>
            </ul>
            {% endfor %}
        </div>
    </div>
</div>
