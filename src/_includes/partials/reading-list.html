<div class="[ dot-shadow panel ] [ bg-secondary-glare ]" id="book-list">
	<div class="[ wrapper ] [ flow flow-space-700 ]">
		{% if bookListHeadline %}
		<h2 class="[ headline ] [ measure-micro ]" data-highlight="primary">
			{{ bookListHeadline }}
		</h2>
		{% endif %}
		<div>
			<ul class="book-list">
				{% for item in bookListItems %}
				<li class="book-list-item">
					<span>[{{item.data.read}}]</span> <span class="book-title-author"><a href="{{ item.url }}" class="book-list__link">{{
							item.data.title
							}} - {{ item.data.authorLast }}, {{ item.data.authorFirst }}</a>
						{% if (item.data.rating | float) >= 4 %}
						<span role="img" aria-label="Star" title="Star">⭐️</span>
						{% endif %}
					</span>
				</li>
				{% endfor %}
			</ul>
		</div>
	</div>
</div>
