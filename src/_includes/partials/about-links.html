<ul class="about__list">
    {% for item in aboutLinks.items %}
    <li>
        {% if item.rel %}
        <a href="{{ item.url }}" target="_blank" rel="me">{{ item.text }}</a>
        {% else %}
        <a href="{{ item.url }}" target="_blank" rel="noopener noreferrer">{{ item.text }}</a>
        {% endif %}
    </li>
    {% endfor %}
</ul>
